networks:
  interview_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: interview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interview_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interview_pass}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interview_user} -d ${POSTGRES_DB:-interview_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interview_net

  # ---------------------------------------------------------------------------
  # Redis — cache & Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: interview_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - interview_net

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-interview_user}:${POSTGRES_PASSWORD:-interview_pass}@postgres:5432/${POSTGRES_DB:-interview_db}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
    ports:
      - "8080:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - interview_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ---------------------------------------------------------------------------
  # React Frontend (production nginx build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: interview_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - interview_net
